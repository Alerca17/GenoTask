<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA - Distribuidor de Tareas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                Distribuidor Genético de Tareas
            </h1>
            <p class="text-gray-400 mt-2">Optimizando tiempos de entrega con Inteligencia Artificial</p>
        </header>

        <div class="flex justify-center mb-8">
            <button id="btn-optimize" onclick="optimizeTasks()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105">
                Ejecutar Algoritmo Genético 🚀
            </button>
        </div>

        <div id="loading" class="hidden text-center text-emerald-400 font-semibold mb-8 animate-pulse">
            Evolucionando generaciones... Calculando el fitness...
        </div>

        <div id="results-container" class="hidden">
            <div class="bg-gray-800 rounded-xl p-6 mb-6 shadow-2xl border border-gray-700">
                <h2 class="text-2xl font-bold mb-2">Tiempo Total Estimado del Proyecto: <span id="total-time" class="text-emerald-400"></span> horas</h2>
                <p class="text-sm text-gray-400">El tiempo está determinado por el trabajador con mayor carga.</p>
            </div>

            <div id="workers-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                </div>
        </div>
    </div>

    <script>
        async function optimizeTasks() {
            const btn = document.getElementById('btn-optimize');
            const loading = document.getElementById('loading');
            const resultsContainer = document.getElementById('results-container');
            const workersGrid = document.getElementById('workers-grid');
            
            btn.disabled = true;
            loading.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            workersGrid.innerHTML = '';

            try {
                const response = await fetch('/optimize', { method: 'POST' });
                const data = await response.json();

                document.getElementById('total-time').innerText = data.total_project_time;

                for (const [worker, tasks] of Object.entries(data.assignments)) {
                    let taskHtml = tasks.map(t => `<li class="bg-gray-700 p-2 rounded mb-2 text-sm flex justify-between"><span>${t.task}</span> <span class="text-blue-300">${t.time}h</span></li>`).join('');
                    
                    let workerCard = `
                        <div class="bg-gray-800 rounded-xl p-5 border border-gray-700 shadow-lg">
                            <h3 class="text-xl font-bold text-blue-400 mb-1">${worker}</h3>
                            <p class="text-xs text-gray-400 mb-4">Carga total: ${data.metrics[worker]} hrs</p>
                            <ul>${taskHtml}</ul>
                        </div>
                    `;
                    workersGrid.innerHTML += workerCard;
                }

                resultsContainer.classList.remove('hidden');
            } catch (error) {
                alert("Hubo un error al ejecutar la IA.");
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
